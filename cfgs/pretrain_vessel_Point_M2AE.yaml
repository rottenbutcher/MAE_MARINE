optimizer:
  type: AdamW
  kwargs:
    lr: 0.0005
    weight_decay: 0.05

scheduler:
  type: CosLR
  kwargs:
    epochs: 300
    initial_epochs: 10

dataset:
  train:
    _base_: cfgs/dataset_configs/Vessel.yaml
    others:
      subset: 'train'
      HPR_POINTS: 2458
  val:
    _base_: cfgs/dataset_configs/Vessel.yaml
    others:
      subset: 'test'
      HPR_POINTS: 2458

model:
  NAME: Point_M2AE
  mask_ratio: 0.6 # HPR 방식에서는 사용되지 않으나 초기화 위해 필요
  # 계층 구조 설정 (3-level 예시)
  group_sizes: [32, 64, 128]
  num_groups: [256, 128, 64] # 8192 -> 256개 그룹, 256 -> 128, 128 -> 64
  # Encoder 설정
  encoder_depths: [2, 2, 8]
  encoder_dims: [96, 192, 384]
  # Decoder 설정
  decoder_depths: [2, 2, 2]
  decoder_dims: [384, 192, 96]
  decoder_up_blocks: [1, 1]
  # 공통
  num_heads: 6
  drop_path_rate: 0.1
  local_radius: [0, 0, 0] # Local attention 비활성화

total_bs: 32 # M2AE는 메모리를 더 많이 사용할 수 있으므로 배치 사이즈 감소
step_per_update: 1
max_epoch: 300