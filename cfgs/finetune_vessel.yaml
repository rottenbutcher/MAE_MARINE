optimizer : {
  type: AdamW,
  kwargs: {
  lr : 0.0005,
  weight_decay : 0.05
}}

scheduler: {
  type: CosLR,
  kwargs: {
    epochs: 300,
    initial_epochs : 10
}}

dataset:
      train:
        _base_: cfgs/dataset_configs/Vessel.yaml
        others:
          subset: 'finetune_train' # 'train' -> 'finetune_train'
          HPR_POINTS: 2458
      val:
        _base_: cfgs/dataset_configs/Vessel.yaml
        others:
          subset: 'finetune_test' # 'test' -> 'finetune_test'
          HPR_POINTS: 2458

model : {
  NAME: PointTransformer,
  trans_dim: 384,
  depth: 12,
  drop_path_rate: 0.1,
  cls_dim: 700,
  num_heads: 6,
  group_size: 32,
  num_group: 64,
  encoder_dims: 384,
}


npoints: 8192
total_bs : 32
step_per_update : 1
max_epoch : 300
grad_norm_clip : 10