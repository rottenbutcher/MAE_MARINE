optimizer:
  type: AdamW
  kwargs:
    lr: 0.001
    weight_decay: 0.05

scheduler:
  type: CosLR
  kwargs:
    epochs: 100 # dVAE는 보통 더 짧게 학습시킵니다.
    initial_epochs: 10

dataset:
  train:
    _base_: cfgs/dataset_configs/Vessel.yaml
    others:
      subset: 'train'
      # dVAE는 HPR이 아닌 전체 포인트 클라우드를 사용합니다.
      HPR_POINTS: 0 # 이 값을 0으로 설정하거나 제거하여 일반 로더처럼 동작하게 합니다.
  val:
    _base_: cfgs/dataset_configs/Vessel.yaml
    others:
      subset: 'test'
      HPR_POINTS: 0

model:
  NAME: DiscreteVAE
  num_tokens: 8192  # 코드북의 크기 (단어사전의 단어 수)
  encoder_dims: 384
  group_size: 32
  num_group: 256

total_bs: 128
step_per_update: 1
max_epoch: 100