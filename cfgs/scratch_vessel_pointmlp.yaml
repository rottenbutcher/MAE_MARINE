optimizer : {
  type: AdamW,
  kwargs: {
  lr : 0.001,
  weight_decay : 0.05
}}

scheduler: {
  type: CosLR,
  kwargs: {
    epochs: 250,
    initial_epochs : 10
}}

dataset : {
  # 1. 학습(train)에는 'pretrain.txt'를 사용
  train : { 
    _base_: cfgs/dataset_configs/Vessel.yaml,
    others: { subset: 'train', split_file: 'pretrain.txt' } 
  },
  # 2. 학습 중 검증(val)에는 'finetune_train.txt'를 사용
  val : { 
    _base_: cfgs/dataset_configs/Vessel.yaml,
    others: { subset: 'test', split_file: 'finetune_train.txt' } 
  },
  # 3. 학습 완료 후 최종 테스트(test)에는 'finetune_test.txt'를 사용
  test : { 
    _base_: cfgs/dataset_configs/Vessel.yaml,
    others: { subset: 'test', split_file: 'finetune_test.txt' }
  }
}

model : {
  NAME: PointMLP, # 모델 이름을 PointMLP로 변경
  cls_dim: 500,   # Vessel 데이터셋의 클래스 수
}

npoints: 2048
total_bs : 128
step_per_update : 1
max_epoch : 250
grad_norm_clip : 10