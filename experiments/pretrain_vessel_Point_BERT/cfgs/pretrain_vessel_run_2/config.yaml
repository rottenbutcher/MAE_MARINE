optimizer:
  type: AdamW
  kwargs:
    lr: 0.001
    weight_decay: 0.05

scheduler:
  type: CosLR
  kwargs:
    epochs: 300
    initial_epochs: 10

dataset:
  train:
    _base_: cfgs/dataset_configs/Vessel.yaml
    others:
      subset: 'train'
      HPR_POINTS: 2458
  val:
    _base_: cfgs/dataset_configs/Vessel.yaml
    others:
      subset: 'test'
      HPR_POINTS: 2458

model:
  NAME: Point_BERT
  dvae_ckpt: experiments/pretrain_dvae/cfgs/pretrain_dvae_vessel/ckpt-best.pth
  group_size: 32
  num_group: 256
  num_tokens: 8192 # dVAE 코드북 크기 (가상)
  encoder_dims: 384
  transformer_config:
    trans_dim: 384
    depth: 12
    drop_path_rate: 0.1
    num_heads: 6

total_bs: 64
step_per_update: 1
max_epoch: 300
