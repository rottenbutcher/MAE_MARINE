optimizer : {
  type: AdamW,
  kwargs: {
  lr : 0.001,
  weight_decay : 0.05
}}

scheduler: {
  type: CosLR,
  kwargs: {
    epochs: 250,
    initial_epochs : 10
}}

dataset : {
  # 학습에는 finetune_train.txt 사용
  train : { 
    _base_: cfgs/dataset_configs/Vessel.yaml,
    others: { subset: 'train', split_file: 'pretrain.txt' } # 이 부분을 수정/추가
  },
  # 검증에는 finetune_test.txt 사용
  val : { 
    _base_: cfgs/dataset_configs/Vessel.yaml,
    others: { subset: 'test', split_file: 'finetune_train.txt' } # 이 부분을 수정/추가
  },
  # 최종 테스트에도 finetune_test.txt 사용
  test : { 
    _base_: cfgs/dataset_configs/Vessel.yaml,
    others: { subset: 'test', split_file: 'finetune_test.txt' } # 이 부분을 수정/추가
  }
}

model : {
  NAME: PointMLP, # 모델 이름을 PointMLP로 변경
  cls_dim: 700,   # Vessel 데이터셋의 클래스 수
}

npoints: 1024
total_bs : 32
step_per_update : 1
max_epoch : 250
grad_norm_clip : 10