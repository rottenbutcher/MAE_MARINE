optimizer:
  type: AdamW
  kwargs:
    lr: 0.001
    weight_decay: 0.05

scheduler:
  type: CosLR
  kwargs:
    epochs: 300
    initial_epochs: 10

dataset:
  train:
    _base_: cfgs/dataset_configs/Vessel.yaml
    others:
      subset: 'train'
      HPR_POINTS: 2458
      HPR_VERTICAL_ANGLE: 20
      HPR_EXCLUSION_ANGLE: 20
  val:
    _base_: cfgs/dataset_configs/Vessel.yaml
    others:
      subset: 'test'
      HPR_POINTS: 2458
      HPR_VERTICAL_ANGLE: 20
      HPR_EXCLUSION_ANGLE: 20

model:
  NAME: Point_MAE
  group_size: 32
  num_group: 256  # 8192 points / 32 group_size = 256 groups
  loss: cdl2
  transformer_config:
    mask_ratio: 0.0 # 초기화 오류 방지를 위한 항목 (실제 사용 X)
    mask_type: 'rand'
    trans_dim: 384
    encoder_dims: 384
    depth: 12
    drop_path_rate: 0.1
    num_heads: 6
    decoder_depth: 4
    decoder_num_heads: 6

total_bs: 64
step_per_update: 1
max_epoch: 300